replicaCount: 1

image:
  repository: ghcr.io/mrehbr/pgsense-rs
  pullPolicy: IfNotPresent
  # Overrides the image tag (default is chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL

# -- Path to rules file inside the container.
# Defaults to /etc/pgsense/rules.toml (bundled in image).
rulesFile: ""

# -- Source databases to monitor.
# Each entry maps to a [[databases]] block in config.toml.
# Passwords are read from files mounted from Kubernetes Secrets.
databases:
  - name: mydb
    host: localhost
    port: 5432
    dbname: mydb
    username: postgres
    publication: pgsense_pub
    # -- Existing Secret containing the database password.
    # The chart mounts it as a file and wires the config to read from that file.
    passwordSecret:
      name: ""
      key: password
    tls:
      enabled: false
      trustedRootCerts: ""
    # -- Per-database scan filter (overrides global scan)
    scan: {}

# -- Global scan filter defaults (overridden per-database if set)
scan:
  includeSchemas: []
  excludeTables: []
  excludeColumns: []

pipeline:
  batchMaxSize: 1000
  batchMaxFillMs: 5000
  tableErrorRetryDelayMs: 10000
  tableErrorRetryMaxAttempts: 5
  maxTableSyncWorkers: 4
  # -- Pipeline store backend: "memory" (state lost on restart) or
  # "postgres" (state persisted in each source DB under `etl` schema,
  # using the same credentials as the replication connection).
  store: memory

log:
  level: info
  format: console
  output: stderr

alerts:
  dedupWindowSeconds: 300
  log:
    enabled: true
  stdout:
    enabled: false
  jsonl:
    enabled: false
    # name: ""
    path: /tmp/alerts.jsonl
  # -- Webhook channels (repeatable).
  # webhooks:
  #   - name: security-webhook
  #     url: https://hooks.example.com/alert
  #     timeout_ms: 5000
  #     headers:
  #       Authorization: "Bearer token123"
  webhooks: []
  # -- Slack channels (repeatable).
  # slack:
  #   - name: security-slack
  #     token: xoxb-your-bot-token
  #     channel: "#pgsense-alerts"
  #     username: pgsense-bot
  #     icon_emoji: ":shield:"
  #     timeout_ms: 5000
  #     batch_size: 8
  #     batch_window_ms: 2000
  #     max_retries: 3
  slack: []
  # -- PostgreSQL alert channel config.
  # postgres:
  #   name: postgres
  #   host: localhost
  #   port: 5432
  #   dbname: postgres
  #   username: postgres
  #   password: postgres                # inline password
  #   passwordSecret:                   # or from K8s Secret
  #     name: my-secret
  #     key: password
  #   schema: pgsense
  #   table: findings
  #   tls:
  #     enabled: false
  #     trustedRootCerts: ""
  postgres: {}

telemetry:
  enabled: false
  endpoint: "http://localhost:4317"
  protocol: grpc
  serviceName: pgsense
  sampleRate: 1.0

server:
  enabled: true
  port: 9090

profiling:
  enabled: false

service:
  type: ClusterIP
  port: 9090

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

grafanaDashboard:
  enabled: false
  labels: {}
  annotations: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
