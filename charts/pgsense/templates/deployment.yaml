apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgsense.fullname" . }}
  labels:
    {{- include "pgsense.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pgsense.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pgsense.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pgsense.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - scan
            - -c
            - /config/config.toml
          ports:
            {{- if .Values.server.enabled }}
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.server.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- range .Values.databases }}
            {{- if and .passwordSecret .passwordSecret.name }}
            - name: db-secret-{{ .name }}
              mountPath: /secrets/databases/{{ .name }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if and .Values.alerts.postgres .Values.alerts.postgres.passwordSecret .Values.alerts.postgres.passwordSecret.name }}
            - name: alerts-postgres-secret
              mountPath: /secrets/alerts-postgres
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pgsense.fullname" . }}
        {{- range .Values.databases }}
        {{- if and .passwordSecret .passwordSecret.name }}
        - name: db-secret-{{ .name }}
          secret:
            secretName: {{ .passwordSecret.name }}
            items:
              - key: {{ .passwordSecret.key }}
                path: {{ .passwordSecret.key }}
        {{- end }}
        {{- end }}
        {{- if and .Values.alerts.postgres .Values.alerts.postgres.passwordSecret .Values.alerts.postgres.passwordSecret.name }}
        - name: alerts-postgres-secret
          secret:
            secretName: {{ .Values.alerts.postgres.passwordSecret.name }}
            items:
              - key: {{ .Values.alerts.postgres.passwordSecret.key }}
                path: {{ .Values.alerts.postgres.passwordSecret.key }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
