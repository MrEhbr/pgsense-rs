{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgsense.fullname" . }}-dashboard
  labels:
    {{- include "pgsense.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  pgsense.json: |-
{{ .Files.Get "dashboards/pgsense.json" | indent 4 }}
{{- end }}
