# pgsense config for loadtest stand
# Runs inside Docker — connects to postgres via Docker network hostname

[[databases]]
host = "postgres"
dbname = "postgres"
username = "postgres"
password = "postgres"
tls.enabled = false

[alerts]
dedup_window_seconds = 0  # disabled for load testing — every finding triggers an alert

[alerts.log]
enabled = true

[telemetry]
enabled = true
endpoint = "http://victoria-traces:4317"

[server]
enabled = true
