# pgsense-rs detection rules
#
# Rule types:
#   - regex (default): pattern-based matching with optional validator
#   - builtin: algorithmic detection (credit_card, ssn)
#   - script: Rhai script with `fn detect(value)` returning array of strings
#
# Common fields (all rule types):
#   id          — unique identifier (required)
#   description — human-readable description (required)
#   category    — grouping label: PII, PCI_DSS, CUSTOM, etc. (required)
#   severity    — low | medium | high | critical (required)
#
# Regex-specific fields:
#   pattern     — regex pattern to match (required for regex type)
#   validate    — optional post-match validator: "luhn" or "ssn"
#
# Builtin-specific fields:
#   builtin     — detector name: "credit_card" or "ssn" (required for builtin type)
#
# Script-specific fields:
#   script      — path to .rhai file with `fn detect(value)` (required for script type)
#
# Allowlist (optional, works with any rule type):
#   [rules.allowlist]
#   description — why these are allowed
#   values      — exact values to skip
#   patterns    — regex patterns; if any matches, finding is suppressed

# --- Builtin detectors (algorithmic, no regex needed) ---

[[rules]]
type = "builtin"
id = "credit-card"
description = "Credit card numbers (Visa, MC, Amex, Discover)"
category = "PCI_DSS"
severity = "critical"
builtin = "credit_card"

[[rules]]
type = "builtin"
id = "ssn"
description = "US Social Security Numbers"
category = "PII"
severity = "critical"
builtin = "ssn"

