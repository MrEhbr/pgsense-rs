# pgsense config for loadtest stand
# Runs inside Docker — connects to postgres via Docker network hostname

[log]
format = "console"
output = "stderr"

[[databases]]
host = "127.0.0.1"
port = 5432
dbname = "postgres"
username = "postgres"
password = "postgres"
publication = "pgsense_pub"

[databases.tls]
enabled = false

rules_file = "config/rules.toml"

[pipeline]
batch_max_size = 1000
batch_max_fill_ms = 5000
table_error_retry_delay_ms = 10000
table_error_retry_max_attempts = 5
max_table_sync_workers = 4
store = "memory"

[scan]

[alerts]
dedup_window_seconds = 0  # disabled for load testing — every finding triggers an alert

[alerts.log]
enabled = true

[alerts.stdout]
enabled = false

[alerts.jsonl]
enabled = false

[server]
enabled = true
port = 9090

